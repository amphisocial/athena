# ============================================================
#  AthenaBot — nginx front door
#  /etc/nginx/sites-available/athenabot   (symlink into sites-enabled)
#
#  apex (athenabot.ai)        -> static homepage   (/opt/apps/site)
#  smartjobs.athenabot.ai     -> RoleFit/SmartJobs (127.0.0.1:3001)
#  voice.athenabot.ai         -> Healthcare Voice  (127.0.0.1:3002)
#  plm.athenabot.ai           -> Lite-PLM          (127.0.0.1:3003)
#
#  This file is HTTP-only. Run certbot --nginx afterward and it will
#  rewrite these blocks to add TLS (443) + redirect 80->443 for each host.
# ============================================================

# ---- shared proxy settings ----
# (kept inline per block for clarity; same headers everywhere)

# ---------- Apex: static marketing homepage ----------
server {
    listen 80;
    listen [::]:80;
    server_name athenabot.ai www.athenabot.ai;

    root /opt/apps/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---------- SmartJobs / RoleFit ----------
server {
    listen 80;
    listen [::]:80;
    server_name smartjobs.athenabot.ai;

    # resume / JD uploads are sent as JSON up to ~12MB — allow headroom
    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # lets the app build https:// checkout URLs
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 90s;
    }
}

# ---------- Healthcare Voice AI ----------
server {
    listen 80;
    listen [::]:80;
    server_name voice.athenabot.ai;

    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

# ---------- Lite-PLM ----------
server {
    listen 80;
    listen [::]:80;
    server_name plm.athenabot.ai;

    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}

# To add a new product later: copy a proxy block, change server_name and the
# 127.0.0.1:PORT, then `sudo nginx -t && sudo systemctl reload nginx` and
# `sudo certbot --nginx -d new.athenabot.ai`.
