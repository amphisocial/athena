# /etc/nginx/sites-available/athenabot
# Reverse proxy: athenabot.ai -> Node app on 127.0.0.1:8080
# After placing this file, certbot will add the TLS (443) block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name athenabot.ai www.athenabot.ai;

    # Let the Node app handle everything (it serves the site + the /api routes).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    # Basic hardening
    client_max_body_size 1m;
    server_tokens off;
}
