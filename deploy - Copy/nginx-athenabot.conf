# /etc/nginx/sites-available/athenabot.ai
#
# Reverse proxy for the athenabot.ai root domain, matching the pattern you're
# likely already using for smartjobs./flashcards./plm./voice.athenabot.ai —
# each subdomain its own server block, proxying to a different local port.
#
# This app runs on PORT=3000 internally (set in .env) — change the
# proxy_pass port below if you pick a different one, and make sure it
# doesn't collide with the ports your other four apps already use.

server {
    listen 80;
    listen [::]:80;
    server_name athenabot.ai www.athenabot.ai;

    # certbot will rewrite this block to redirect to https and add the
    # 443 server block below the first time you run:
    #   sudo certbot --nginx -d athenabot.ai -d www.athenabot.ai

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
